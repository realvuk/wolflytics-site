baseURL: "https://vukdinic.com/"
languageCode: en-us
title: Vuk Dinic
theme: ["PaperMod"]

caches:
  images:
    dir: :cacheDir/images

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Vuk Dinic
  description: "Vuk Dinic — computational sociologist & data scientist writing about politics, language, and power, explored through data science, NLP, and machine learning."
  keywords: [Vuk Dinic, Computational Sociology, Data Science, Political Discourse, NLP, Machine Learning, Digital Culture, Blog, Portfolio]
  author: Vuk Dinic

  # Homepage structured data: describe the site owner as a Person, not an
  # Organization. This helps search engines and AI models identify who Vuk
  # Dinic is and link the site to his other profiles (via socialIcons / sameAs).
  schema:
    publisherType: Person
  images: ["images/site-preview.jpg"]
  DateFormat: "2 January 2006"
  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true
  assets:
    disableHLJS: false
    disableFingerprinting: true
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"
    safari_pinned_tab: "safari-pinned-tab.svg"

  label:
    text: "Vuk Dinic"
    icon: "/apple-touch-icon.png"
    iconHeight: 35

  # Enable personal branding profile
  profileMode:
    enabled: true
    title: "Vuk Dinic"
    subtitle: "Computational Sociologist & Data Scientist"
    imageUrl: "images/profile.svg" # Add this image
    imageWidth: 120
    imageHeight: 120
    imageTitle: "Vuk Dinic"
    buttons:
      - name: Blog
        url: posts
      - name: Projects
        url: projects
      - name: About
        url: about

  # Home page welcome
  homeInfoParams:
    Title: "Hi, I'm Vuk 🧠"
    Content: >
      Exploring politics, language, and power through data.
      This is my digital lab — part blog, part portfolio, always evolving.

  socialIcons:
    - name: github
      url: "https://github.com/realvuk"
    - name: linkedin
      url: "https://www.linkedin.com/in/vukdinic/"
    - name: bluesky
      url: "https://bsky.app/profile/vukdinic.bsky.social"

  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/realvuk/wolflytics-site/edit/main/content"
    Text: "Suggest an edit"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 1
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 2
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 3
    - identifier: now
      name: Now
      url: /now/
      weight: 4
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 5
    - identifier: about
      name: About
      url: /about/
      weight: 6
    - name: "Resume"
      url: "/resume/"
      weight: 7

pygmentsUseClasses: true

markup:
  highlight:
    noClasses: false
    style: monokai
